fragment PostParts on Post {
  __typename
  title
  body
}

fragment PageParts on Page {
  __typename
  ... on PageHome {
    hero {
      __typename
      eyebrow
      headline
      sub
      primaryButtonText
      primaryButtonHref
      ghostButtonText
      ghostButtonHref
      stats {
        __typename
        number
        label
      }
    }
    about {
      __typename
      backgroundColor
      label
      headline
      paragraphs
    }
    how {
      __typename
      backgroundColor
      label
      headline
      description
      steps {
        __typename
        number
        title
        body
      }
    }
    criteria {
      __typename
      backgroundColor
      label
      headline
      items {
        __typename
        title
        description
      }
    }
    promise {
      __typename
      backgroundColor
      headline
      items
    }
    kairosStory {
      __typename
      backgroundColor
      eyebrow
      headline
      definition
      body
    }
    decisionFrame {
      __typename
      label
      headline
      options {
        __typename
        title
        description
        bullets
        isHighlighted
      }
    }
    cta {
      __typename
      backgroundColor
      headline
      sub
      buttonText
      contactEmail
    }
  }
  ... on PageDefault {
    title
    body
  }
}
